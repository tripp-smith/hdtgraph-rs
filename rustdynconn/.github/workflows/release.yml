name: Release
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --sdist -m crates/rustdynconn-py/pyproject.toml
          working-directory: rustdynconn
      - run: pip install maturin
      - run: maturin upload --non-interactive --skip-existing dist/*
        working-directory: rustdynconn
