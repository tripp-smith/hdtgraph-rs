name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format
        working-directory: rustdynconn
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: rustdynconn
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: rustdynconn
        run: cargo test --all --all-features

      - name: Install maturin + test deps
        working-directory: rustdynconn
        run: |
          python -m pip install -U pip
          python -m pip install maturin
          python -m pip install -r tests/python/requirements.txt

      - name: Build & install extension (maturin develop)
        working-directory: rustdynconn
        run: maturin develop -m crates/rustdynconn-py/Cargo.toml

      - name: Py tests
        working-directory: rustdynconn
        run: pytest -q tests/python -m "not slow"
