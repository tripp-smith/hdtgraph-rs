name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: write

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Create virtualenv for maturin
        working-directory: rustdynconn
        shell: bash
        run: |
          python -m venv .venv

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format
        working-directory: rustdynconn
        run: cargo fmt --all -- --check

      - name: Rust clippy
        working-directory: rustdynconn
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        working-directory: rustdynconn
        run: cargo test --all --all-features

      - name: Install maturin + test deps
        working-directory: rustdynconn
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            VENV_PY=".venv/Scripts/python"
          else
            VENV_PY=".venv/bin/python"
          fi
          "$VENV_PY" -m pip install -U pip
          "$VENV_PY" -m pip install maturin
          "$VENV_PY" -m pip install -r tests/python/requirements.txt

      - name: Build & install extension (maturin build)
        working-directory: rustdynconn
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            VENV_PY=".venv/Scripts/python"
          else
            VENV_PY=".venv/bin/python"
          fi
          "$VENV_PY" -m maturin develop -m crates/rustdynconn-py/Cargo.toml

      - name: Py tests
        working-directory: rustdynconn
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            VENV_PY=".venv/Scripts/python"
          else
            VENV_PY=".venv/bin/python"
          fi
          "$VENV_PY" -m pytest -q tests/python -m "not slow"

  trigger-wheels:
    name: Trigger wheels workflow
    needs: test
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch wheels workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'wheels.yml',
              ref: context.ref,
            });
